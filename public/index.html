<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multitank</title>
    <link rel="stylesheet" href="/style.css?v=0.2.4">
  </head>
  <body>
    <div id="dev-badge" class="dev-badge" hidden>LOCAL DEV</div>

    <!-- START SCREEN -->
    <div id="start-screen" class="start-screen">
      <canvas id="bg-canvas" class="bg-canvas"></canvas>
      <div class="start-card">
        <h1 class="game-title">MULTITANK</h1>
        <p class="game-subtitle">Multiplayer Arena</p>
        <div class="name-row">
          <input id="name-input" type="text" maxlength="16" placeholder="Enter your name..." autocomplete="off" spellcheck="false">
        </div>
        <button id="play-button" class="play-button">PLAY</button>
        <p class="controls-hint">WASD / Arrow Keys to move, Mouse to aim, Click to fire</p>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="game-screen" hidden>
      <div id="diagnostic-banner" class="diagnostic-banner" aria-live="polite"></div>
      <div id="death-overlay" class="death-overlay" hidden>
        <div class="death-card">
          <div class="death-title">YOU DIED</div>
          <button id="respawn-button" class="respawn-button" type="button">RESPAWN</button>
        </div>
      </div>
      <canvas id="game" class="game-canvas"></canvas>
      <div id="upgrade-menu" class="upgrade-menu" hidden></div>
    </div>

    <!-- Hidden legacy elements for backward compat with client.js -->
    <div hidden aria-hidden="true">
      <span id="status"></span>
      <span id="latency"></span>
      <span id="match-status"></span>
      <p id="room-label"></p>
      <p id="player-label"></p>
      <p id="profile-label"></p>
      <p id="round-label"></p>
      <ul id="scoreboard"></ul>
      <ul id="kill-feed"></ul>
      <form id="join-form">
        <button id="join-match-button" type="submit"></button>
        <div class="join-hidden" hidden>
          <input id="room-input" name="room" type="text" value="default">
          <input id="spectate-input" name="spectate" type="checkbox">
          <button id="create-room-button" type="button"></button>
          <button id="ready-button" type="button" hidden></button>
          <p id="lobby-room-code"></p>
          <select id="map-select"></select>
          <select id="team-select"></select>
          <select id="class-select"></select>
          <p id="lobby-summary"></p>
          <button id="refresh-rooms-button" type="button"></button>
          <ul id="room-browser"></ul>
          <section id="results-card" hidden>
            <p id="results-summary"></p>
            <ul id="results-list"></ul>
          </section>
        </div>
      </form>
      <div class="play-area" id="play-area"></div>
      <div id="fallback-visual-layer">
        <div id="fallback-center-marker"></div>
        <div id="fallback-player-marker" hidden>
          <div class="fallback-player-ring"></div>
          <div class="fallback-player-dot"></div>
          <div class="fallback-player-label"></div>
        </div>
        <div id="fallback-remote-markers"></div>
      </div>
    </div>

    <script type="module" src="/client.js?v=0.2.4"></script>
  </body>
</html>
